<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Tomasz Siemek</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=Caveat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══ RESET & TOKENS ═══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
    --bg:#fefcfc;--bg2:#f9f4f5;--bg3:#f3ebec;
    --accent:#b5707b;--accent-l:#d4959e;--accent-d:#8e4f5a;
    --accent2:#6b5b7b;--accent3:#5b7b7b;
    --glow:rgba(181,112,123,.08);
    --surface:rgba(181,112,123,.03);--surface2:rgba(181,112,123,.06);
    --border:rgba(181,112,123,.10);--border2:rgba(181,112,123,.18);
    --text:#2a1f22;--text2:#6b555b;--text3:#a8919a;
    --sans:'Space Grotesk',sans-serif;
    --display:'Syne',sans-serif;
    --mono:'JetBrains Mono',monospace;
    --hand:'Caveat',cursive;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg3);color:var(--text);overflow-x:hidden;line-height:1.65;min-height:100vh}
a{color:inherit;text-decoration:none}
::selection{background:rgba(181,112,123,.15);color:var(--accent-d)}

/* ═══ BLOG SECTION ═══ */
.blog-sec{
    max-width:1280px;margin:0 auto;padding:80px 7vw 120px;
}
.sec-tag{
    font-family:var(--mono);font-size:.68rem;font-weight:600;letter-spacing:3px;
    text-transform:uppercase;color:var(--accent);margin-bottom:14px;
    display:flex;align-items:center;gap:10px;
}
.sec-tag::before{content:'';width:24px;height:2px;background:var(--accent);border-radius:1px}
.sec-title{
    font-family:var(--display);font-size:clamp(2rem,4vw,3.4rem);
    font-weight:800;letter-spacing:-1.5px;line-height:1.08;margin-bottom:56px;
}
.sec-title .dim{color:var(--text3);font-weight:400}

/* ═══ FILTER BAR ═══ */
.fbar{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    margin-bottom:12px;padding:16px 20px;
    background:rgba(254,252,252,.88);backdrop-filter:blur(16px);
    border:1px solid var(--border);border-radius:18px;
    position:sticky;top:16px;z-index:100;
}
.fbar-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1}
.fbar-right{display:flex;align-items:center;gap:8px}

/* Search */
.sbox{
    display:flex;align-items:center;gap:8px;background:var(--bg2);
    border:1px solid var(--border);border-radius:50px;padding:0 16px;
    transition:border .3s;min-width:180px;
}
.sbox:focus-within{border-color:var(--accent)}
.sbox svg{width:14px;height:14px;stroke:var(--text3);stroke-width:2;fill:none;flex-shrink:0}
.sbox input{
    background:none;border:none;outline:none;color:var(--text);
    font-family:var(--mono);font-size:.78rem;padding:9px 0;width:140px;
}
.sbox input::placeholder{color:var(--text3)}

/* Dropdown trigger button */
.dd-wrap{position:relative}
.dd-btn{
    display:flex;align-items:center;gap:7px;
    padding:9px 16px;border-radius:50px;
    font-family:var(--mono);font-size:.75rem;font-weight:500;
    background:var(--bg2);border:1px solid var(--border);color:var(--text2);
    cursor:pointer;transition:all .25s;white-space:nowrap;user-select:none;
}
.dd-btn:hover{border-color:var(--accent);color:var(--accent)}
.dd-btn.open{border-color:var(--accent);color:var(--accent);background:rgba(181,112,123,.04)}
.dd-btn svg{width:12px;height:12px;stroke:currentColor;stroke-width:2.5;fill:none;transition:transform .25s;flex-shrink:0}
.dd-btn.open svg{transform:rotate(180deg)}
.dd-badge{
    display:inline-flex;align-items:center;justify-content:center;
    min-width:18px;height:18px;padding:0 5px;border-radius:9px;
    background:var(--accent);color:#fff;font-size:.6rem;font-weight:700;
}

/* Dropdown panel */
.dd-panel{
    position:absolute;top:calc(100% + 8px);left:0;min-width:220px;
    background:rgba(254,252,252,.96);backdrop-filter:blur(20px);
    border:1px solid var(--border2);border-radius:16px;
    box-shadow:0 12px 40px rgba(181,112,123,.10),0 4px 16px rgba(0,0,0,.04);
    padding:8px;z-index:200;
    opacity:0;pointer-events:none;transform:translateY(6px);
    transition:opacity .2s,transform .2s;
}
.dd-panel.open{opacity:1;pointer-events:all;transform:translateY(0)}
.dd-panel-title{
    font-family:var(--mono);font-size:.6rem;font-weight:600;letter-spacing:2px;
    text-transform:uppercase;color:var(--text3);padding:6px 10px 8px;
}

/* Tag checkboxes */
.tag-option{
    display:flex;align-items:center;gap:10px;padding:8px 10px;
    border-radius:10px;cursor:pointer;transition:background .2s;
    font-size:.82rem;color:var(--text2);user-select:none;
}
.tag-option:hover{background:var(--surface2)}
.tag-option input[type=checkbox]{display:none}
.tag-check{
    width:16px;height:16px;border-radius:5px;border:1.5px solid var(--border2);
    flex-shrink:0;display:flex;align-items:center;justify-content:center;
    transition:all .2s;
}
.tag-option input:checked ~ .tag-check{background:var(--accent);border-color:var(--accent)}
.tag-option input:checked ~ .tag-check::after{
    content:'';display:block;width:5px;height:8px;
    border:2px solid #fff;border-top:none;border-left:none;
    transform:rotate(42deg) translateY(-1px);
}
.tag-dot{
    width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-left:auto;
}
.dd-sep{height:1px;background:var(--border);margin:6px 0}
.dd-actions{display:flex;gap:6px;padding:6px 4px 2px}
.dd-act-btn{
    flex:1;padding:7px;border-radius:8px;font-family:var(--mono);font-size:.68rem;
    font-weight:600;cursor:pointer;border:none;transition:all .2s;
}
.dd-act-clear{background:var(--bg2);color:var(--text3)}
.dd-act-clear:hover{color:var(--text)}
.dd-act-apply{background:var(--accent);color:#fff}
.dd-act-apply:hover{background:var(--accent-d)}

/* Time radio options */
.time-option{
    display:flex;align-items:center;gap:10px;padding:8px 10px;
    border-radius:10px;cursor:pointer;transition:background .2s;
    font-size:.82rem;color:var(--text2);user-select:none;
}
.time-option:hover{background:var(--surface2)}
.time-option input[type=radio]{display:none}
.time-radio{
    width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border2);
    flex-shrink:0;display:flex;align-items:center;justify-content:center;
    transition:all .2s;
}
.time-option input:checked ~ .time-radio{border-color:var(--accent)}
.time-option input:checked ~ .time-radio::after{
    content:'';display:block;width:7px;height:7px;border-radius:50%;background:var(--accent);
}
.time-option input:checked ~ span{color:var(--accent);font-weight:500}

/* Sort row */
.sort-row{
    display:flex;align-items:center;gap:6px;margin-left:auto;
}
.sort-btn{
    padding:8px 14px;border-radius:50px;font-family:var(--mono);font-size:.72rem;
    font-weight:500;background:var(--bg2);border:1px solid var(--border);
    color:var(--text3);cursor:pointer;transition:all .25s;
}
.sort-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Active tag pills */
.active-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;min-height:0}
.active-tags:empty{display:none}
.tag-pill{
    display:inline-flex;align-items:center;gap:6px;padding:5px 12px;
    border-radius:50px;font-family:var(--mono);font-size:.65rem;font-weight:500;
    border:1px solid var(--border2);cursor:pointer;transition:all .2s;
}
.tag-pill:hover{border-color:var(--accent);color:var(--accent)}
.tag-pill span{font-size:.7rem;opacity:.6}

.blog-count{
    font-family:var(--mono);font-size:.7rem;color:var(--text3);
    margin:0 0 20px;
}

/* ═══ BLOG GRID ═══ */
.blog-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(360px,1fr));
    gap:16px;
}
.blog-card{
    background:var(--bg);border:1px solid var(--border);border-radius:20px;
    padding:28px;transition:all .4s cubic-bezier(.16,1,.3,1);
    position:relative;overflow:hidden;display:flex;flex-direction:column;
}
.blog-card::before{
    content:'';position:absolute;top:0;left:0;width:100%;height:3px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    opacity:0;transition:opacity .3s;
}
.blog-card:hover{
    border-color:rgba(181,112,123,.22);
    box-shadow:0 20px 60px rgba(181,112,123,.07);
}
.blog-card:hover::before{opacity:1}

/* Episode ghost number */
.card-ep{
    position:absolute;top:-10px;right:16px;
    font-family:var(--display);font-size:7.5rem;font-weight:800;
    line-height:1;letter-spacing:-4px;
    color:var(--accent);opacity:.055;
    pointer-events:none;user-select:none;
    transition:opacity .4s;
}
.blog-card:hover .card-ep{opacity:.09}

/* Card header */
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:12px}
.card-tags-row{display:flex;flex-wrap:wrap;gap:5px}
.ct{
    font-family:var(--mono);font-size:.6rem;font-weight:600;
    padding:3px 9px;border-radius:6px;text-transform:uppercase;
    letter-spacing:.5px;white-space:nowrap;
    cursor:pointer;transition:all .2s;
}
.ct:hover{opacity:.8}

/* Tag color map */
.ct-edukacja{background:rgba(181,112,123,.08);color:var(--accent)}
.ct-ai{background:rgba(107,91,123,.08);color:var(--accent2)}
.ct-biznes{background:rgba(91,123,123,.08);color:var(--accent3)}
.ct-mikropowiadczenia{background:rgba(245,158,11,.08);color:#b07800}
.ct-prompt{background:rgba(59,130,246,.08);color:#2563eb}
.ct-llm{background:rgba(16,185,129,.08);color:#047857}
.ct-ml{background:rgba(239,68,68,.08);color:#b91c1c}
.ct-default{background:var(--surface2);color:var(--text3)}

/* Reading time */
.read-time{
    display:flex;align-items:center;gap:5px;white-space:nowrap;
    font-family:var(--mono);font-size:.65rem;color:var(--text3);flex-shrink:0;
}
.read-time svg{width:12px;height:12px;stroke:var(--text3);stroke-width:2;fill:none}

/* Card body */
.blog-title{
    font-family:var(--display);font-size:1.18rem;font-weight:700;
    margin-bottom:10px;letter-spacing:-.3px;line-height:1.28;
    color:var(--text);
}
.blog-excerpt{
    font-size:.875rem;color:var(--text2);line-height:1.75;
    font-weight:300;margin-bottom:auto;padding-bottom:20px;
}

/* Card footer */
.card-foot{
    display:flex;justify-content:space-between;align-items:center;
    padding-top:16px;border-top:1px solid var(--border);margin-top:auto;
}
.card-author{display:flex;align-items:center;gap:9px}
.author-avatar{
    width:28px;height:28px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent-l),var(--accent2));
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:.6rem;font-weight:700;color:#fff;
    flex-shrink:0;
}
.author-info{}
.author-name{font-size:.78rem;font-weight:600;color:var(--text);line-height:1}
.author-role{font-family:var(--mono);font-size:.6rem;color:var(--text3);margin-top:2px}
.card-date{
    font-family:var(--mono);font-size:.65rem;color:var(--text3);
    text-align:right;
}
.card-date .date-label{font-size:.55rem;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:2px;opacity:.7}

/* Empty state */
.blog-empty{
    grid-column:1/-1;text-align:center;padding:80px 20px;
    font-family:var(--mono);font-size:.85rem;color:var(--text3);
}
.blog-empty .empty-icon{font-size:2.5rem;display:block;margin-bottom:12px;opacity:.4}

/* ═══ RESPONSIVE ═══ */
@media(max-width:900px){
    .blog-sec{padding:60px 5vw 80px}
    .blog-grid{grid-template-columns:1fr}
    .fbar{top:8px;gap:8px}
    .fbar-right{width:100%}
    .sbox{flex:1;min-width:0}
    .sbox input{width:100%}
}
@media(max-width:560px){
    .fbar{flex-direction:column;align-items:stretch}
    .fbar-left,.fbar-right{width:100%}
    .sort-row{margin-left:0}
}
</style>
</head>
<body>

<div class="blog-sec">

    <div class="sec-tag">Blog</div>
    <div class="sec-title">Cotygodniowe<br><span class="dim">wpisy.</span></div>

    <!-- FILTER BAR -->
    <div class="fbar">
        <!-- Search -->
        <div class="fbar-left">
            <div class="sbox">
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="blogSearch" placeholder="Szukaj wpisu...">
            </div>

            <!-- Tags dropdown -->
            <div class="dd-wrap" id="ddTagsWrap">
                <button class="dd-btn" id="ddTagsBtn" onclick="toggleDd('tags')">

                    <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>

                        <button class="dd-act-btn dd-act-apply" onclick="applyTags()">Zastosuj</button>
                    </div>
                </div>
            </div>

            <!-- Time dropdown -->
            <div class="dd-wrap" id="ddTimeWrap">
                <button class="dd-btn" id="ddTimeBtn" onclick="toggleDd('time')">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    Czas
                    <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div class="dd-panel" id="ddTimePanel" style="min-width:200px">
                    <div class="dd-panel-title">Filtruj po dacie</div>
                    <label class="time-option"><input type="radio" name="timeFilter" value="all" checked><span class="time-radio"></span><span>Wszystkie</span></label>
                    <label class="time-option"><input type="radio" name="timeFilter" value="1m"><span class="time-radio"></span><span>Ostatni miesiąc</span></label>

                    <label class="time-option"><input type="radio" name="timeFilter" value="2025"><span class="time-radio"></span><span>2025</span></label>
                </div>
            </div>
        </div>

        <!-- Sort -->
        <div class="fbar-right">
            <div class="sort-row">
                <button class="sort-btn active" id="sortNew" onclick="setSort('newest')">Najnowsze</button>
                <button class="sort-btn" id="sortOld" onclick="setSort('oldest')">Najstarsze</button>
            </div>
        </div>
    </div>

    <!-- Active tag pills -->
    <div class="active-tags" id="activePills"></div>

    <!-- Count -->
    <div class="blog-count" id="blogCount"></div>

    <!-- Grid -->
    <div class="blog-grid" id="blogGrid"></div>

</div>

let sortOrder    = 'newest';
let searchQuery  = '';
let openDd       = null;

/* ═══ BUILD TAG OPTIONS ═══ */
const tagOptions = document.getElementById('tagOptions');
ALL_TAGS.forEach(tag => {
    const label = document.createElement('label');
    label.className = 'tag-option';
    label.innerHTML = `
        <input type="checkbox" value="${tag}">
        <span class="tag-check"></span>
        <span>${tag}</span>
        <span class="tag-dot" style="background:${TAG_DOT_COLORS[tag]||'#999'}"></span>
    `;
    label.querySelector('input').addEventListener('change', () => {
        const v = label.querySelector('input').value;
        if (label.querySelector('input').checked) pendingTags.add(v);
        else pendingTags.delete(v);
        updateTagBadge(pendingTags.size);
    });
    tagOptions.appendChild(label);
});

/* ═══ DROPDOWN LOGIC ═══ */
function toggleDd(which) {
    const panels = {tags:'ddTagsPanel', time:'ddTimePanel'};
    const btns   = {tags:'ddTagsBtn',   time:'ddTimeBtn'};
    if (openDd && openDd !== which) closeDd(openDd);
    const isOpen = document.getElementById(panels[which]).classList.contains('open');
    if (isOpen) { closeDd(which); return; }
    document.getElementById(panels[which]).classList.add('open');
    document.getElementById(btns[which]).classList.add('open');
    if (which === 'tags') {
        pendingTags = new Set(selectedTags);
        syncCheckboxes();
        updateTagBadge(pendingTags.size);
    }
    openDd = which;
}
function closeDd(which) {
    const panels = {tags:'ddTagsPanel', time:'ddTimePanel'};
    const btns   = {tags:'ddTagsBtn',   time:'ddTimeBtn'};
    document.getElementById(panels[which]).classList.remove('open');
    document.getElementById(btns[which]).classList.remove('open');
    if (openDd === which) openDd = null;
}
document.addEventListener('click', e => {
    if (!e.target.closest('#ddTagsWrap')) closeDd('tags');
    if (!e.target.closest('#ddTimeWrap')) closeDd('time');
});

/* Time filter: apply instantly on radio change */
document.querySelectorAll('input[name=timeFilter]').forEach(r => {
    r.addEventListener('change', () => { timeFilter = r.value; render(); });
});

function syncCheckboxes() {
    tagOptions.querySelectorAll('input').forEach(inp => {
        inp.checked = pendingTags.has(inp.value);
    });
}
function updateTagBadge(n) {
    const b = document.getElementById('tagBadge');
    b.style.display = n ? 'inline-flex' : 'none';
    b.textContent = n;
}
function clearTags() {
    pendingTags.clear();
    syncCheckboxes();
    updateTagBadge(0);
}
function applyTags() {
    selectedTags = new Set(pendingTags);
    closeDd('tags');
    updateTagBadge(selectedTags.size);
    renderPills();
    render();
}

/* ═══ ACTIVE PILLS ═══ */
function renderPills() {
    const container = document.getElementById('activePills');
    container.innerHTML = '';
    selectedTags.forEach(tag => {
        const pill = document.createElement('div');
        pill.className = `tag-pill ${TAG_COLORS[tag]||'ct-default'}`;
        pill.innerHTML = `${tag} <span>✕</span>`;
        pill.style.cssText = `border-color:${TAG_DOT_COLORS[tag]||'var(--border2)'}22`;
        pill.addEventListener('click', () => {
            selectedTags.delete(tag);
            pendingTags.delete(tag);
            syncCheckboxes();
            updateTagBadge(pendingTags.size);
            renderPills();
            render();
        });
        container.appendChild(pill);
    });
}

/* ═══ SORT ═══ */
function setSort(order) {
    sortOrder = order;
    document.getElementById('sortNew').classList.toggle('active', order === 'newest');
    document.getElementById('sortOld').classList.toggle('active', order === 'oldest');
    render();
}

/* ═══ SEARCH ═══ */
document.getElementById('blogSearch').addEventListener('input', e => {
    searchQuery = e.target.value;
    render();
});

/* ═══ FILTER + RENDER ═══ */
function matchesTime(dateStr) {
    if (timeFilter === 'all') return true;
    const d = new Date(dateStr), now = new Date();
    if (timeFilter === '1m') return (now - d) <= 30*24*60*60*1000;
    if (timeFilter === '3m') return (now - d) <= 90*24*60*60*1000;
    if (timeFilter === '2026') return d.getFullYear() === 2026;
    if (timeFilter === '2025') return d.getFullYear() === 2025;
    return true;
}

function formatDate(str) {
    const d = new Date(str);
    return d.toLocaleDateString('pl-PL', {day:'numeric', month:'short', year:'numeric'});
}

function render() {
    const q = searchQuery.toLowerCase().trim();
    let results = posts.filter(p => {
        if (selectedTags.size > 0 && !p.tags.some(t => selectedTags.has(t))) return false;
        if (!matchesTime(p.date)) return false;
        if (q && !p.title.toLowerCase().includes(q) && !p.excerpt.toLowerCase().includes(q) && !p.tags.some(t => t.toLowerCase().includes(q))) return false;
        return true;
    });

    results = [...results].sort((a, b) => {
        const da = new Date(a.date), db = new Date(b.date);
        return sortOrder === 'newest' ? db - da : da - db;
    });

    const grid = document.getElementById('blogGrid');
    document.getElementById('blogCount').textContent = `${results.length} / ${posts.length} wpisów`;

    if (!results.length) {
        grid.innerHTML = `<div class="blog-empty"><span class="empty-icon">🔍</span>Nie znaleziono wpisów pasujących do filtrów.</div>`;
        return;
    }

    grid.innerHTML = '';
    results.forEach((post, i) => {
        const card = document.createElement('article');
        card.className = 'blog-card';
        card.style.animationDelay = (i * 0.04) + 's';

        const tagsHtml = post.tags
            .map(t => `<span class="ct ${TAG_COLORS[t]||'ct-default'}" data-tag="${t}">${t}</span>`)
            .join('');

        const epNum = String(post.id).padStart(2, '0');
        card.innerHTML = `
            <div class="card-ep">${epNum}</div>
            <div class="card-head">
                <div class="card-tags-row">${tagsHtml}</div>
                <div class="read-time">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    ${post.readingTime} min
                </div>
            </div>
            <h3 class="blog-title">${post.title}</h3>
            <p class="blog-excerpt">${post.excerpt}</p>
            <div class="card-foot">
                <div class="card-author">
                    <div class="author-avatar">TS</div>
                    <div class="author-info">
                        <div class="author-name">${post.author.name}</div>
                        <div class="author-role">${post.author.role}</div>
                    </div>
                </div>
                <div class="card-date">
                    <span class="date-label">Opublikowano</span>
                    ${formatDate(post.date)}
                </div>
            </div>
        `;

        /* click on tag inside card → quick-filter */
        card.querySelectorAll('.ct[data-tag]').forEach(el => {
            el.addEventListener('click', e => {
                e.stopPropagation();
                const tag = el.dataset.tag;
                if (!selectedTags.has(tag)) {
                    selectedTags.add(tag);
                    pendingTags.add(tag);
                    syncCheckboxes();
                    updateTagBadge(pendingTags.size);
                    renderPills();
                    render();
                }
            });
        });

        grid.appendChild(card);
    });
}

render();
</script>
</body>
</html>
